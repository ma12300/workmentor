name: market-briefing

on:
  schedule:
    # GitHub 크론 지연(평균 20~60분)을 감안해 목표 발행시각 40분 전 실행
    - cron: "20 22 * * *"   # 07:20 KST → 아침판 (08:00 목표)
    - cron: "10 23 * * *"   # 08:10 KST → 아침판 백업 (앞 실행 성공 시 자동 생략)
    - cron: "20 8 * * *"    # 17:20 KST → 저녁판 (18:00 목표)
    - cron: "10 9 * * *"    # 18:10 KST → 저녁판 백업
    - cron: "20 14 * * *"   # 23:20 KST → 자정판 (00:00 목표)
    - cron: "10 15 * * *"   # 00:10 KST → 자정판 백업
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: market-briefing
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install-korean-font
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: install-deps
        run: npm install pdfkit --no-save --no-package-lock --loglevel=error

      - name: build-market-briefing
        run: node scripts/build-market-briefing.mjs

      - name: commit
        run: |
          git config user.name "workmentor-bot"
          git config user.email "bot@workmentor.co.kr"
          git add briefings
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "auto: market briefing [skip ci]"
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push 경합 — rebase 후 재시도 ($i/3)"
            git pull --rebase origin main || exit 1
          done
          git push
