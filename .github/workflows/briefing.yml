name: morning-briefing

on:
  schedule:
    # 22:20 UTC = 07:20 KST — GitHub 크론 지연(평균 20~60분)을 감안해 8시 전후 발행 목표
    - cron: "20 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install-korean-font
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: install-deps
        run: npm install pdfkit --no-save --no-package-lock --loglevel=error

      - name: build-briefing
        run: node scripts/build-briefing.mjs

      - name: commit
        run: |
          git config user.name "workmentor-bot"
          git config user.email "bot@workmentor.co.kr"
          git add briefings
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "auto: morning briefing [skip ci]"
          # 다른 커밋과 경합 시 rebase 후 재시도 (최대 3회)
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push 경합 — rebase 후 재시도 ($i/3)"
            git pull --rebase origin main || exit 1
          done
          git push
